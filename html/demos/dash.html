<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Janus Dual Streaming (Hardcoded)</title>

  <script src="js/adapter.min.js"></script>
  <script src="./janus.js"></script>

  <style>
    :root {
      --bg:#0b0f14; --panel:#121826; --border:#223049; --text:#e6edf3; --muted:#9fb0c0;
      --btn:#1f6feb; --btn2:#30363d;
    }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Arial,sans-serif; background:var(--bg); color:var(--text); }
    header { position:sticky; top:0; z-index:10; padding:12px 14px; border-bottom:1px solid var(--border); background:rgba(18,24,38,.95); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    h1 { margin:0; font-size:15px; font-weight:700; letter-spacing:.2px; }
    .btn { border:1px solid var(--border); background:var(--btn); color:#fff; padding:8px 12px; border-radius:10px; cursor:pointer; font-weight:700; }
    .btn.secondary { background:var(--btn2); }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    .status { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; font-size:12px; color:var(--muted); }
    .pill { border:1px solid var(--border); padding:6px 10px; border-radius:999px; background:rgba(0,0,0,.2); }
    main { padding:14px; }

    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width: 900px){ .grid{ grid-template-columns:1fr; } }

    .tile { background:var(--panel); border:1px solid var(--border); border-radius:16px; overflow:hidden; position:relative; min-height:240px; cursor:pointer; }
    .tileHdr { position:absolute; left:0; right:0; top:0; padding:10px 10px 24px 10px; background:linear-gradient(to bottom, rgba(0,0,0,.75), rgba(0,0,0,0)); z-index:2; pointer-events:none; }
    .tileHdr .title { font-size:13px; font-weight:800; }
    .tileHdr .sub { margin-top:4px; font-size:12px; color:rgba(255,255,255,.75); font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace; }

    video { width:100%; height:100%; display:block; background:#000; object-fit:contain; }

    /* CSS fallback fullscreen */
    .tile.focused { position:fixed; inset:12px; z-index:9999; border-radius:18px; box-shadow:0 12px 50px rgba(0,0,0,.6); }
  </style>
</head>

<body>
<header>
  <h1>Janus Dual Streaming</h1>
  <button id="startBtn" class="btn">Start</button>
  <button id="stopBtn" class="btn secondary" disabled>Stop</button>

  <div class="status">
    <span class="pill">Janus: <span id="conn">idle</span></span>
    <span class="pill">A: <span id="aState">idle</span></span>
    <span class="pill">B: <span id="bState">idle</span></span>
  </div>
</header>

<main>
  <div class="grid">
    <div id="tileA" class="tile" title="Click to toggle fullscreen">
      <div class="tileHdr">
        <div class="title">Stream A</div>
        <div class="sub" id="aSub">mountpoint: ?</div>
      </div>
      <video id="vidA" autoplay playsinline muted></video>
    </div>

    <div id="tileB" class="tile" title="Click to toggle fullscreen">
      <div class="tileHdr">
        <div class="title">Stream B</div>
        <div class="sub" id="bSub">mountpoint: ?</div>
      </div>
      <video id="vidB" autoplay playsinline muted></video>
    </div>
  </div>
</main>

<script>
(() => {
  // ========= CONFIG =========
  const JANUS_WS_URL = "ws://10.42.0.1:8188"; // <-- change if needed
  const STREAM_ID_A  = 10;                          // <-- mountpoint id
  const STREAM_ID_B  = 11;                          // <-- mountpoint id

  // ========= UI =========
  const connEl = document.getElementById("conn");
  const aStateEl = document.getElementById("aState");
  const bStateEl = document.getElementById("bState");

  const aSub = document.getElementById("aSub");
  const bSub = document.getElementById("bSub");
  aSub.textContent = `mountpoint: ${STREAM_ID_A}`;
  bSub.textContent = `mountpoint: ${STREAM_ID_B}`;

  const startBtn = document.getElementById("startBtn");
  const stopBtn  = document.getElementById("stopBtn");

  const tileA = document.getElementById("tileA");
  const tileB = document.getElementById("tileB");
  const vidA  = document.getElementById("vidA");
  const vidB  = document.getElementById("vidB");

const alertAudio = new Audio("/ed209trim.wav");
let audioUnlocked = false;

document.addEventListener("click", async () => {
  if (audioUnlocked) return;
  try {
    await alertAudio.play();
    alertAudio.pause();
    alertAudio.currentTime = 0;
    audioUnlocked = true;
    console.log("Audio unlocked");
  } catch (e) {
    console.warn("Audio unlock failed:", e);
  }
}, { once: true });

function handleDataMessage(data) {
  let msg = data;
  try { msg = JSON.parse(data); } catch (e) {}

  if (msg?.type === "alert" && msg?.value === "obstacle_close") {
    alertAudio.currentTime = 0;
    alertAudio.play().catch(err => {
      console.warn("Playback blocked:", err);
    });
  }
}

  function setConn(s){ connEl.textContent = s; }
  function setA(s){ aStateEl.textContent = s; }
  function setB(s){ bStateEl.textContent = s; }

  // Fullscreen toggle (real Fullscreen API + CSS fallback)
  function toggleFullscreen(tile) {
    if (document.fullscreenEnabled) {
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(()=>{});
      } else {
        tile.requestFullscreen().catch(() => tile.classList.toggle("focused"));
      }
      return;
    }
    const other = (tile === tileA) ? tileB : tileA;
    other.classList.remove("focused");
    tile.classList.toggle("focused");
  }
  tileA.addEventListener("click", () => toggleFullscreen(tileA));
  tileB.addEventListener("click", () => toggleFullscreen(tileB));
  document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
      tileA.classList.remove("focused");
      tileB.classList.remove("focused");
    }
  });

  // ========= JANUS =========
  let janus = null;

  // Per-stream state containers (keeps scope sane)
  const streams = {
    A: { id: STREAM_ID_A, stateFn: setA, video: vidA, handle: null, media: null },
    B: { id: STREAM_ID_B, stateFn: setB, video: vidB, handle: null, media: null },
  };

  function detachStream(key) {
    const s = streams[key];
    try { s.handle && s.handle.hangup(); } catch(e) {}
    try { s.handle && s.handle.detach(); } catch(e) {}
    s.handle = null;

    try { s.video.srcObject = null; } catch(e) {}
    s.media = null;

    s.stateFn("idle");
  }

  function destroyAll() {
    detachStream("A");
    detachStream("B");

    if (janus) {
      try { janus.destroy(); } catch(e) {}
      janus = null;
    }

    setConn("idle");
    startBtn.disabled = false;
    stopBtn.disabled = true;
  }

  function attachStreaming(key) {
    const s = streams[key];
    s.stateFn("attaching…");

    janus.attach({
      plugin: "janus.plugin.streaming",
      opaqueId: `dual-${key}-${Janus.randomString(8)}`,

      success: (pluginHandle) => {
        s.handle = pluginHandle;
        s.stateFn("watching…");
        s.handle.send({ message: { request: "watch", id: s.id } });
      },

      error: (err) => {
        console.error(`[${key}] attach error:`, err);
        s.stateFn("error");
      },

      onmessage: (msg, jsep) => {
        if (msg?.error) {
          console.error(`[${key}] plugin error:`, msg.error);
          s.stateFn("error");
          return;
        }
        if (msg?.result?.status) s.stateFn(msg.result.status);

        if (jsep) {
          if (!s.handle) {
            console.warn(`[${key}] got jsep but handle not set yet`);
            return;
          }
          s.handle.createAnswer({
            jsep,
            media: { audioSend: false, videoSend: false, data: true },
            success: (ourJsep) => {
              s.handle.send({ message: { request: "start" }, jsep: ourJsep });
              s.stateFn("starting…");
            },
            error: (err) => {
              console.error(`[${key}] createAnswer error:`, err);
              s.stateFn("error");
            }
          });
        }
      },

      // Modern Janus: you should handle tracks here
      onremotetrack: (track, mid, on) => {
        if (!on) return;

        // Create/retain a MediaStream for this tile
        if (!s.media) s.media = new MediaStream();

        // Avoid duplicates (Janus may call unmute multiple times)
        const existing = s.media.getTracks().some(t => t.id === track.id);
        if (!existing) s.media.addTrack(track);

        s.video.srcObject = s.media;
        s.video.play().catch(()=>{});
        s.stateFn("playing");
      },

    ondataopen: (label, protocol) => {
      console.log(`[${key}] data channel open`, label, protocol);
    },

    ondata: (data, label) => {
      console.log(`[${key}] data message`, data);

      try {
        const msg = JSON.parse(data);
        console.log(`[${key}] parsed data`, msg);

        handleDataMessage(data);

        // Optional hook per tile
        if (typeof s.onData === "function") {
          s.onData(msg);
        }

      } catch (e) {
        if (typeof s.onData === "function") {
          s.onData(data);
        }
      }
    },


      oncleanup: () => {
        s.stateFn("stopped");
        try { s.video.srcObject = null; } catch(e) {}
        s.media = null;
      }
    });
  }

  function start() {
    startBtn.disabled = true;
    stopBtn.disabled = false;

    setConn("initializing…");
    setA("idle");
    setB("idle");

    Janus.init({
      debug: "all",
      callback: () => {
        setConn("connecting…");
        janus = new Janus({
          server: JANUS_WS_URL,

          success: () => {
            setConn("connected");
            attachStreaming("A");
            attachStreaming("B");
          },

          error: (err) => {
            console.error("Janus error:", err);
            setConn("error");
            destroyAll();
          },

          destroyed: () => {
            setConn("destroyed");
          }
        });
      }
    });
  }

  startBtn.addEventListener("click", start);
  stopBtn.addEventListener("click", destroyAll);
})();
</script>
</body>
</html>
